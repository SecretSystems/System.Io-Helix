<script>
/* ════════════════════════════════
   HELPERS
════════════════════════════════ */
function isMobile(){
  return window.innerWidth <= 768;
}

/* ════════════════════════════════
   CURSOR
════════════════════════════════ */
const cur=document.getElementById('cur');
const curR=document.getElementById('cur-r');

let mx=0,my=0,rx=0,ry=0;

document.addEventListener('mousemove',e=>{
  if(isMobile()) return;
  mx=e.clientX;
  my=e.clientY;
  cur.style.left=mx+'px';
  cur.style.top=my+'px';
});

(function lr(){
  if(!isMobile()){
    rx+=(mx-rx)*.1;
    ry+=(my-ry)*.1;
    curR.style.left=rx+'px';
    curR.style.top=ry+'px';
  }
  requestAnimationFrame(lr);
})();

const bigC=()=>{
  if(isMobile()) return;
  cur.style.width='16px';
  cur.style.height='16px';
  curR.style.width='44px';
  curR.style.height='44px';
};

const smC=()=>{
  if(isMobile()) return;
  cur.style.width='10px';
  cur.style.height='10px';
  curR.style.width='30px';
  curR.style.height='30px';
};

document.querySelectorAll('a,button').forEach(el=>{
  el.addEventListener('mouseenter',bigC);
  el.addEventListener('mouseleave',smC);
});

/* ════════════════════════════════
   SCENE / CAMERA PARALLAX
════════════════════════════════ */
const scene=document.getElementById('scene');
const sc=document.getElementById('sc');

let rotX=0,rotY=0,tRotX=12,tRotY=16,pX=0,pY=0;
let touchStartX=0,touchStartY=0;

document.addEventListener('pointermove',e=>{
  if(isMobile()) return;
  const hw=innerWidth*.5;
  const hh=innerHeight*.5;
  pX=(e.clientX-hw)/hw;
  pY=(e.clientY-hh)/hh;
});

document.addEventListener('touchstart',e=>{
  if(!isMobile()) return;
  if(!e.touches.length) return;
  touchStartX=e.touches[0].clientX;
  touchStartY=e.touches[0].clientY;
},{passive:true});

document.addEventListener('touchmove',e=>{
  if(!isMobile()) return;
  if(!e.touches.length) return;

  const dx=e.touches[0].clientX-touchStartX;
  const dy=e.touches[0].clientY-touchStartY;

  pX=Math.max(-1.2,Math.min(1.2,dx/(window.innerWidth*0.5)));
  pY=Math.max(-1.2,Math.min(1.2,dy/(window.innerHeight*0.5)));
},{passive:true});

document.addEventListener('touchend',()=>{
  if(!isMobile()) return;
  pX*=0.7;
  pY*=0.7;
},{passive:true});

(function cam(){
  if(isMobile()){
    rotX+=((-pY*10)-rotX)*.08;
    rotY+=((pX*22)-rotY)*.08;
  }else{
    rotX+=(pY*tRotX-rotX)*.012;
    rotY+=(-pX*tRotY-rotY)*.012;
  }

  scene.style.transform=`rotateX(${rotX}deg) rotateY(${rotY}deg)`;
  requestAnimationFrame(cam);
})();

/* ════════════════════════════════
   CARD DIMENSIONS
════════════════════════════════ */
const CW=240,CH=200,CWE=380,CHE=320;

/* ════════════════════════════════
   BUILD CARDS from sites/index.json
════════════════════════════════ */
let cards=[], allSites=[], currentLayout='table';

async function loadSites(){
  try{
    const res=await fetch('sites/index.json?v='+Date.now());
    if(!res.ok) throw new Error();
    allSites=await res.json();
    document.getElementById('loading').style.display='none';
    buildCards(allSites);
  }catch(e){
    document.getElementById('loading').style.display='none';
    document.getElementById('empty').style.display='block';
  }
}

function buildCards(sites){
  sc.innerHTML='';
  cards=[];

  if(!sites||!sites.length){
    document.getElementById('empty').style.display='block';
    return;
  }

  document.getElementById('empty').style.display='none';

  sites.forEach((s,i)=>{
    const path='sites/'+s.file;
    const url=s.url||path;
    const el=document.createElement('div');
    el.className='pcard';
    el.dataset.c=s.color!==undefined?s.color:0;

    el.innerHTML=`
      <div class="bbar">
        <div class="bd" style="background:#ff5f57"></div>
        <div class="bd" style="background:#febc2e"></div>
        <div class="bd" style="background:#28c840"></div>
        <div class="burl">${url}</div>
      </div>
      <div class="pw" id="pw${i}">
        <iframe src="${path}" title="${s.title||s.file}" loading="lazy"
          sandbox="allow-same-origin allow-scripts" scrolling="no"></iframe>
      </div>
      <div class="clabel">
        <div>
          <div class="ctag">${s.tag||'Website'}</div>
          <div class="ctitle">${s.title||s.file}</div>
        </div>
        <div class="cnum">${String(i+1).padStart(2,'0')}</div>
      </div>`;

    el.querySelector('iframe').addEventListener('load',()=>{
      document.getElementById('pw'+i)?.classList.add('loaded');
    });

    el.addEventListener('click',e=>{
      if(e.target.closest('.bbar')) return;

      if(el.classList.contains('exp')){
        window.open(url,'_blank');
      }else{
        toggleExpand(el);
      }
    });

    el.addEventListener('mouseenter',bigC);
    el.addEventListener('mouseleave',smC);

    el.style.opacity='0';
    el.style.transition='none';

    sc.appendChild(el);
    cards.push(el);
  });

  requestAnimationFrame(()=>{
    cards.forEach(c=>{
      const rx2=(Math.random()-.5)*1400;
      const ry2=(Math.random()-.5)*900;
      const rz2=(Math.random()-.5)*1400;
      c.style.position='absolute';
      c.style.left='50%';
      c.style.top='50%';
      c.style.marginLeft=(-CW/2)+'px';
      c.style.marginTop=(-CH/2)+'px';
      c.style.transform=`translate3d(${rx2}px,${ry2}px,${rz2}px)`;
    });

    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        applyLayout(isMobile() ? 'sphere' : 'table',true);
        document.querySelectorAll('.tog').forEach(b=>b.classList.remove('on'));
        const activeBtn=document.querySelector(`.tog[data-layout="${isMobile() ? 'sphere' : 'table'}"]`);
        if(activeBtn) activeBtn.classList.add('on');
      });
    });
  });
}

/* ════════════════════════════════
   LAYOUT ENGINE
════════════════════════════════ */
function posFor(layout,i,isExp){
  const mobile=isMobile();
  const z0=isExp ? (mobile ? 35 : 20) : 0;

  if(layout==='sphere'){
    const r=mobile ? 300 : 420;
    const phi=Math.acos(-1+(2*i)/cards.length);
    const theta=Math.sqrt(cards.length*Math.PI)*phi;
    const sp=Math.sin(phi);
    const x=r*sp*Math.cos(theta);
    const y=(mobile ? 0.82 : 1)*r*Math.cos(phi);
    const z=r*sp*Math.sin(theta);
    const yaw=Math.atan2(x,z);
    const pitch=-Math.atan2(y,Math.hypot(x,z));
    return `translate3d(${x}px,${y}px,${z}px) rotateY(${yaw}rad) rotateX(${pitch}rad) translateZ(${z0}px)`;
  }

  if(layout==='helix'){
    const r=mobile ? 300 : 420;
    const step=mobile ? 0.26 : 0.22;
    const vs=mobile ? 5.2 : 3.8;
    const yOff=cards.length*vs/2;
    const theta=i*step+Math.PI;
    const y=-(i*vs)+yOff;
    const x=r*Math.sin(theta);
    const z=r*Math.cos(theta);
    const yaw=Math.atan2(x,z);
    const pitch=-Math.atan2(y,Math.hypot(x,z)*2);
    return `translate3d(${x}px,${y}px,${z}px) rotateY(${yaw}rad) rotateX(${pitch}rad) translateZ(${z0}px)`;
  }

  if(layout==='grid'){
    const cols=mobile ? 2 : 3;
    const rows=mobile ? 5 : 4;
    const cg=mobile ? 210 : 280;
    const rg=mobile ? 170 : 220;
    const dg=mobile ? 170 : 200;
    const per=cols*rows;
    const layers=Math.ceil(cards.length/per);
    const col=i%cols;
    const row=Math.floor(i/cols)%rows;
    const layer=Math.floor(i/per);
    const x=(col-(cols-1)/2)*cg;
    const yz=((rows-1)/2-row)*rg;
    const z=z0+((layer-(layers-1)/2)*dg);
    return `translate3d(${x}px,${yz}px,${z}px)`;
  }

  return '';
}

function applyLayout(layout,animated=true){
  currentLayout=layout;
  sc.dataset.layout=layout;

  if(layout==='table'){
    tRotX=isMobile()?8:12;
    tRotY=isMobile()?10:16;
  }else if(layout==='sphere'){
    tRotX=isMobile()?14:40;
    tRotY=isMobile()?24:360;
  }else if(layout==='helix'){
    tRotX=isMobile()?12:30;
    tRotY=isMobile()?20:300;
  }else if(layout==='grid'){
    tRotX=isMobile()?8:10;
    tRotY=isMobile()?12:55;
  }

  if(layout==='table'){
    cards.forEach(c=>{
      c.style.position='';
      c.style.left='';
      c.style.top='';
      c.style.marginLeft='';
      c.style.marginTop='';

      const dur=animated?1500:0;
      const delay=animated?Math.random()*700:0;
      c.style.transition=`transform ${dur}ms ${delay}ms cubic-bezier(.77,0,.175,1), opacity ${dur}ms ${delay}ms`;
      c.style.opacity='1';
      c.style.transform=`translateZ(${c.classList.contains('exp')?50:6}px)`;
    });
  }else{
    cards.forEach((c,i)=>{
      c.style.position='absolute';
      c.style.left='50%';
      c.style.top='50%';
      c.style.marginLeft=(-CW/2)+'px';
      c.style.marginTop=(-CH/2)+'px';

      const dur=animated?1600:0;
      const delay=animated?Math.random()*700:0;
      c.style.transition=`transform ${dur}ms ${delay}ms cubic-bezier(.77,0,.175,1), opacity ${dur}ms ${delay}ms`;
      c.style.opacity='1';
      c.style.transform=posFor(layout,i,c.classList.contains('exp'));
    });
  }
}

/* ════════════════════════════════
   EXPAND / COLLAPSE
════════════════════════════════ */
function toggleExpand(card){
  const wasExp=card.classList.contains('exp');

  cards.forEach(c=>c.classList.remove('exp'));

  if(!wasExp){
    card.classList.add('exp');
    card.style.setProperty('--cw',CWE+'px');
    card.style.setProperty('--ch',CHE+'px');
  }

  cards.forEach(c=>{
    if(!c.classList.contains('exp')){
      c.style.removeProperty('--cw');
      c.style.removeProperty('--ch');
    }
  });

  refreshPositions(true);
}

function refreshPositions(spring=false){
  const ease=spring ? 'cubic-bezier(.34,1.56,.64,1)' : 'cubic-bezier(.77,0,.175,1)';

  if(currentLayout==='table'){
    cards.forEach(c=>{
      c.style.transition=`transform .55s ${ease}`;
      c.style.transform=`translateZ(${c.classList.contains('exp')?50:6}px)`;
    });
  }else{
    cards.forEach((c,i)=>{
      c.style.transition=`transform .55s ${ease}`;
      c.style.transform=posFor(currentLayout,i,c.classList.contains('exp'));
    });
  }
}

document.addEventListener('keydown',e=>{
  if(e.key!=='Escape') return;
  cards.forEach(c=>{
    c.classList.remove('exp');
    c.style.removeProperty('--cw');
    c.style.removeProperty('--ch');
  });
  refreshPositions(false);
});

/* ════════════════════════════════
   LAYOUT TOGGLE BUTTONS
════════════════════════════════ */
document.querySelectorAll('.tog').forEach(btn=>{
  btn.addEventListener('mouseenter',bigC);
  btn.addEventListener('mouseleave',smC);

  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tog').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');

    cards.forEach(c=>{
      c.classList.remove('exp');
      c.style.removeProperty('--cw');
      c.style.removeProperty('--ch');
    });

    applyLayout(btn.dataset.layout,true);
  });
});

/* ════════════════════════════════
   MODAL
════════════════════════════════ */
const ov=document.getElementById('ov');

document.getElementById('req-btn').addEventListener('click',()=>{
  ov.classList.add('open');
});

document.getElementById('mcl').addEventListener('click',()=>{
  ov.classList.remove('open');
});

ov.addEventListener('click',e=>{
  if(e.target===ov) ov.classList.remove('open');
});

document.addEventListener('keydown',e=>{
  if(e.key==='Escape') ov.classList.remove('open');
});

document.getElementById('mform').addEventListener('submit',e=>{
  e.preventDefault();
  let ok=true;

  e.target.querySelectorAll('[required]').forEach(f=>{
    if(!f.value.trim()){
      f.style.borderColor='#ff2244';
      ok=false;
    }else{
      f.style.borderColor='rgba(0,200,255,.12)';
    }
  });

  if(!ok) return;

  document.getElementById('mfw').style.display='none';
  document.getElementById('msuc').style.display='block';
});

/* ════════════════════════════════
   RESIZE
════════════════════════════════ */
window.addEventListener('resize',()=>{
  if(currentLayout){
    applyLayout(currentLayout,false);
  }
});

/* ════════════════════════════════
   INIT
════════════════════════════════ */
loadSites();
</script>
